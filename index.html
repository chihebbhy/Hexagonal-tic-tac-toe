<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic Tac Toe</title>
        <link rel="stylesheet" href="index.css">
        <script type="module">
            // Import Firebase
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
            import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

            // Your Firebase config (you get this from Firebase console)
            const firebaseConfig = {
                authDomain: "hexagonal-tic-tac-toe.firebaseapp.com",
                databaseURL: "https://hexagonal-tic-tac-toe-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "hexagonal-tic-tac-toe",
            };

            // Initialize Firebase
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);

            // Make db global (so you can use it in other JS)
            window.db = db;
            window.ref = ref;
            window.set = set;
            window.onValue = onValue;
            window.get = get;
            window.update = update;
</script>
    </head>
    <body>
        <div id="container">
            <div id="menu">
                <h1>Hexagonal Tic Tac Toe</h1>
                <div id="insidemenu">
                <fieldset>
                    <legend>Create Game</legend>

                    <input type="text" id="create-username"
                        placeholder="Your Name"><br>
                    <button id="create-btn" onClick="onCreateRoomClick()">Create
                        Game</button>
                </fieldset>

                <fieldset>
                    <legend>Join Game</legend>

                    <input type="text" id="join-username"
                        placeholder="Your Name"><br>
                    <input type="text" id="join-game-id"
                        placeholder="Game ID"><br>
                    <button id="join-btn" onClick="onJoinRoomClick()">Join
                        Game</button>
                </fieldset>

                <fieldset>
                    <legend>Play locally</legend>
                    <button id="local-btn" onclick="StartGame()">Play Local
                        Game</button>
                </fieldset>
                </div>
            </div>
            <div id="map" style="display : none;"></div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
